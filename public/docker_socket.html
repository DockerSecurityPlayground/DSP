<!doctype html>
<script>
function getUrlParameter(name) {
    name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
    var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
    var results = regex.exec(location.search);
    return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
};
const serviceName = getUrlParameter("serviceName");
const embedMode = getUrlParameter("embed") === "1";
window.DSP_EMBED_MODE = embedMode;
document.title = serviceName;



</script>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- xterm.js CSS -->
    <link rel="stylesheet" href="/assets/css/xterm.min.css" />
    <!-- xterm.js + FitAddon -->
    <script src="/assets/js/xterm.min.js"></script>
    <script src="/assets/js/xterm-addon-fit.min.js"></script>
    <script src="/webshell/socket.io/socket.io.js"></script>
    <script src="/webshell/webshell.js"></script>
    <style>
        html,
        body {
            height: 100%;
            width: 100%;
            margin: 0px;
            padding: 0;
            font-family: "Courier New", monospace;
            background-color: #000;
        }
        #terminal {
            display: block;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }
    </style>
</head>

<body>
